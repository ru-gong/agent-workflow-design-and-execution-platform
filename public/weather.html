<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>城市天气查询</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="/weather-mark.svg" alt="" class="brand-mark" />
          <div>
            <div class="brand-title">城市天气查询</div>
            <div class="brand-subtitle">输入城市，查看当前温度、天气和体感信息</div>
          </div>
        </div>
        <a class="pill link-pill" href="/">返回工作流平台</a>
      </header>

      <main class="weather-workspace">
        <section class="search-panel" aria-labelledby="searchTitle">
          <div>
            <div class="section-title">Weather</div>
            <h1 id="searchTitle">查询当前城市天气</h1>
            <p class="lede">支持中文或英文城市名；结果会显示匹配到的城市、国家和当前天气指标。</p>
          </div>

          <form id="weatherForm" class="search-form">
            <label for="cityInput">城市</label>
            <div class="search-row">
              <input id="cityInput" class="city-input" name="city" autocomplete="address-level2" placeholder="例如：上海、Tokyo、London" required />
              <button id="searchButton" class="primary-button" type="submit">
                <span class="button-icon" aria-hidden="true"></span>
                <span>查询</span>
              </button>
            </div>
            <div id="statusMessage" class="notice" role="status" aria-live="polite">请输入城市名称开始查询。</div>
          </form>
        </section>

        <section class="result-panel" aria-live="polite">
          <div id="emptyState" class="state-card">
            <img src="/weather-mark.svg" alt="" />
            <div>等待查询</div>
            <p>输入城市后，这里会展示当前温度、天气描述、体感温度、湿度和风速。</p>
          </div>

          <div id="loadingState" class="state-card hidden">
            <div class="spinner" aria-hidden="true"></div>
            <div>正在获取天气</div>
            <p>正在匹配城市并读取当前天气数据。</p>
          </div>

          <div id="errorState" class="state-card hidden">
            <div class="error-icon" aria-hidden="true">!</div>
            <div>查询失败</div>
            <p id="errorText">请稍后重试。</p>
          </div>

          <article id="weatherResult" class="weather-card hidden">
            <div class="weather-card-head">
              <div>
                <div id="locationName" class="location-name"></div>
                <div id="locationMeta" class="location-meta"></div>
              </div>
              <span id="updatedAt" class="pill"></span>
            </div>

            <div class="current-weather">
              <div>
                <div id="temperature" class="temperature"></div>
                <div id="description" class="description"></div>
              </div>
              <div class="weather-symbol" aria-hidden="true"></div>
            </div>

            <div class="metrics-grid">
              <div class="metric">
                <span>体感温度</span>
                <strong id="apparentTemperature"></strong>
              </div>
              <div class="metric">
                <span>湿度</span>
                <strong id="humidity"></strong>
              </div>
              <div class="metric">
                <span>风速</span>
                <strong id="windSpeed"></strong>
              </div>
              <div class="metric">
                <span>天气代码</span>
                <strong id="weatherCode"></strong>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/weather.js?v=20260513-1"></script>
  </body>
</html>
